<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Circle Grid Folder Viewer</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      height: 100vh;
      display: flex;
    }

    .left {
      width: 50%;
      display: flex;
      justify-content: center;
      align-items: center;
      background: #f0f0f0;
    }

    .right {
      width: 50%;
      padding: 20px;
      background: white;
      border-left: 2px solid black;
      box-sizing: border-box;
      overflow-y: auto;
    }

    .right h2 {
      margin-top: 0;
    }

    .circle {
      width: 400px;
      height: 400px;
      border-radius: 50%;
      overflow: hidden;
      border: 3px solid black;
      background: white;
      position: relative;
    }

    .grid {
      width: 100%;
      height: 100%;
      display: grid;
      grid-template-columns: repeat(15, 1fr);
      grid-template-rows: repeat(11, 1fr);

      transform: translateY(calc((100% / 11) * 0.38)) rotate(180deg);
    }

    .cell {
      border: 1px solid rgba(0, 0, 0, 0.3);
      box-sizing: border-box;
      cursor: pointer;
      position: relative;
    }

    .cell:hover {
      background: rgba(0, 150, 255, 0.3);
    }

    .cell.selected {
      background: rgba(255, 150, 0, 0.5);
    }

    .figure {
      width: 100%;
      max-width: 500px;
      border-radius: 10px;
      margin-bottom: 15px;
      border: 2px solid #ccc;
    }

    .no-data {
      font-size: 18px;
      color: darkred;
      font-weight: bold;
    }

    .details {
      background: #f7f7f7;
      border: 1px solid #ddd;
      padding: 10px;
      border-radius: 8px;
      margin-bottom: 15px;
    }
  </style>
</head>

<body>

  <!-- LEFT SIDE -->
  <div class="left">
    <div class="circle">
      <div class="grid" id="circleGrid"></div>
    </div>
  </div>

  <!-- RIGHT SIDE -->
  <div class="right">
    <h2 id="panelTitle">Click a square</h2>
    <div id="panelContent">
      <p>Select a square to load data.</p>
    </div>
  </div>

  <script>
    const circleGrid = document.getElementById("circleGrid");
    const panelTitle = document.getElementById("panelTitle");
    const panelContent = document.getElementById("panelContent");

    const rows = 11;
    const cols = 15;

    let selectedCell = null;

    async function loadFolderData(line, col) {
      const folderName = `${line}_${col}`;
      const folderPath = `data/${folderName}`;

      panelTitle.textContent = `Data for ${folderName}`;
      panelContent.innerHTML = `<p>Loading...</p>`;

      try {
        // Try loading the manifest.json
        const response = await fetch(`${folderPath}/manifest.json`);

        if (!response.ok) {
          throw new Error("No manifest file");
        }

        const manifest = await response.json();

        // Title + details
        panelTitle.textContent = manifest.title || `Data for ${folderName}`;

        let html = "";

        if (manifest.details) {
          html += `<div class="details"><strong>Details:</strong><br>${manifest.details}</div>`;
        }

        // Figures
        if (manifest.figures && manifest.figures.length > 0) {
          manifest.figures.forEach(fig => {
            html += `<img class="figure" src="${folderPath}/${fig}" alt="Figure">`;
          });
        } else {
          html += `<p class="no-data">No figures found in folder.</p>`;
        }

        panelContent.innerHTML = html;

      } catch (err) {
        panelTitle.textContent = `Data for ${folderName}`;
        panelContent.innerHTML = `<p class="no-data">No data measured</p>`;
      }
    }

    // Build the grid
    for (let line = 1; line <= rows; line++) {
      for (let col = 1; col <= cols; col++) {
        const cell = document.createElement("div");
        cell.className = "cell";

        cell.title = `Line ${line}, Column ${col}`;

        cell.addEventListener("click", () => {
          if (selectedCell) selectedCell.classList.remove("selected");
          cell.classList.add("selected");
          selectedCell = cell;

          loadFolderData(line, col);
        });

        circleGrid.appendChild(cell);
      }
    }
  </script>

</body>
</html>
