<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Grid Folder Viewer</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      height: 100vh;
      display: flex;
    }

    /* LEFT */
    .left {
      width: 50%;
      display: flex;
      justify-content: center;
      align-items: center;
      background: #f0f0f0;
    }

    /* RIGHT */
    .right {
      width: 50%;
      padding: 20px;
      background: white;
      border-left: 2px solid black;
      box-sizing: border-box;
      overflow-y: auto;
    }

    /* CIRCLE */
    .circle {
      width: 400px;
      height: 400px;
      border-radius: 50%;
      border: 3px solid black;
      background: white;
      position: relative;
      overflow: hidden;
    }

    /* CROSS LINES */
    .circle::before {
      content: "";
      position: absolute;
      top: 0;
      bottom: 0;
      left: 50%;
      width: 2px;
      background: black;
      transform: translateX(-50%);
      z-index: 10;
    }

    .circle::after {
      content: "";
      position: absolute;
      left: 0;
      right: 0;
      top: 50%;
      height: 2px;
      background: black;
      transform: translateY(-50%);
      z-index: 10;
    }

    .diag {
      position: absolute;
      top: 50%;
      left: 50%;
      width: 600px;
      height: 2px;
      background: black;
      transform: translate(-50%, -50%) rotate(54deg);
      z-index: 10;
    }

    /* GRID */
    .grid {
      width: 100%;
      height: 100%;
      display: grid;
      grid-template-columns: repeat(15, 1fr);
      grid-template-rows: repeat(11, 1fr);
      transform: translateY(calc((100% / 11) * 0.38));
      position: relative;
      z-index: 5;
    }

    .cell {
      border: 1px solid rgba(0, 0, 0, 0.3);
      cursor: pointer;
      position: relative;

      display: flex;
      justify-content: center;
      align-items: center;
      font-size: 8px;
    }

    .cell:hover {
      background: rgba(0, 150, 255, 0.3);
    }

    .cell.selected {
      background: rgba(255, 150, 0, 0.5);
    }

    /* TOOLTIP */
    .cell::after {
      content: attr(data-info);
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -130%);
      background: black;
      color: white;
      padding: 3px 6px;
      font-size: 11px;
      border-radius: 4px;
      white-space: nowrap;
      opacity: 0;
      transition: 0.2s;
      pointer-events: none;
      z-index: 50;
    }

    .cell:hover::after {
      opacity: 1;
    }

    /* IMAGES */
    .figure {
      width: 100%;
      max-width: 500px;
      margin-bottom: 10px;
      border-radius: 10px;
      border: 2px solid #ccc;
    }

    .text-box {
      margin-top: 10px;
      padding: 10px;
      border-top: 1px solid #ddd;
      white-space: pre-wrap;
    }

    .no-data {
      color: darkred;
      font-weight: bold;
    }
  </style>
</head>

<body>

  <!-- LEFT -->
  <div class="left">
    <div class="circle">
      <div class="diag"></div>
      <div class="grid" id="grid"></div>
    </div>
  </div>

  <!-- RIGHT -->
  <div class="right">
    <h2 id="title">Click a square</h2>
    <div id="content"></div>
  </div>

  <script>
    const grid = document.getElementById("grid");
    const title = document.getElementById("title");
    const content = document.getElementById("content");

    const rows = 11;
    const cols = 15;

    let selected = null;
    let existingFolders = new Set();

    /* LOAD INDEX OF EXISTING FOLDERS */
    async function loadIndex() {
      try {
        const res = await fetch("data/index.json");
        const list = await res.json();
        existingFolders = new Set(list);
      } catch (e) {
        console.warn("No index.json found");
      }
    }

    /* LOAD FOLDER DATA */
    function loadFolder(r, c) {
      const folder = `data/${r}_${c}`;
      title.textContent = `${r}_${c}`;
      content.innerHTML = `<p>Loading...</p>`;

      let loaded = 0;
      let images = [];
      let currentText = null;

      // TEXT
      fetch(`${folder}/info.txt`)
        .then(res => {
          if (!res.ok) throw new Error();
          return res.text();
        })
        .then(text => currentText = text)
        .catch(() => currentText = null);

      // IMAGES
      for (let i = 1; i <= 10; i++) {
        const img = new Image();
        img.className = "figure";
        img.src = `${folder}/fig${i}.jpg`;

        img.onload = () => {
          images.push(img);
          check();
        };

        img.onerror = check;
      }

      function check() {
        loaded++;
        if (loaded === 10) render();
      }

      function render() {
        content.innerHTML = "";

        if (images.length === 0) {
          content.innerHTML = `<p class="no-data">No data measured</p>`;
          return;
        }

        images.forEach(img => content.appendChild(img));

        const text = document.createElement("div");
        text.className = "text-box";
        text.textContent = currentText || "No description available.";

        content.appendChild(text);
      }
    }

    /* BUILD GRID */
    async function build() {
      await loadIndex();

      for (let r = 1; r <= rows; r++) {
        for (let c = 1; c <= cols; c++) {
          const cell = document.createElement("div");
          cell.className = "cell";

          const key = `${r}_${c}`;

          cell.textContent = key;
          cell.setAttribute("data-info", `Row ${r}, Col ${c}`);

          /* GREEN IF EXISTS */
          if (existingFolders.has(key)) {
            cell.style.background = "rgba(0,255,0,0.25)";
          }

          cell.addEventListener("click", () => {
            if (selected) selected.classList.remove("selected");
            cell.classList.add("selected");
            selected = cell;

            loadFolder(r, c);
          });

          grid.appendChild(cell);
        }
      }
    }

    build();
  </script>

</body>
</html>
