<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Clickable Circle Grid Info Panel</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      height: 100vh;
      display: flex;
    }

    /* Left side (grid area) */
    .left {
      width: 50%;
      display: flex;
      justify-content: center;
      align-items: center;
      background: #f0f0f0;
    }

    /* Right side (info panel) */
    .right {
      width: 50%;
      padding: 20px;
      background: white;
      border-left: 2px solid black;
      box-sizing: border-box;
    }

    .right h2 {
      margin-top: 0;
    }

    .info-box {
      border: 2px solid #ccc;
      border-radius: 10px;
      padding: 15px;
      background: #fafafa;
    }

    .info-box img {
      width: 100%;
      max-width: 350px;
      border-radius: 10px;
      display: block;
      margin-bottom: 15px;
    }

    /* Circle */
    .circle {
      width: 400px;
      height: 400px;
      border-radius: 50%;
      overflow: hidden;
      border: 3px solid black;
      background: white;
      position: relative;
    }

    /* Inner grid */
    .grid {
      width: 100%;
      height: 100%;
      display: grid;
      grid-template-columns: repeat(15, 1fr);
      grid-template-rows: repeat(11, 1fr);

      /* Shift down by 38% of one cell height + rotate 180 degrees */
      transform: translateY(calc((100% / 11) * 0.38)) rotate(180deg);
    }

    .cell {
      border: 1px solid rgba(0, 0, 0, 0.3);
      box-sizing: border-box;
      cursor: pointer;
      position: relative;
    }

    .cell:hover {
      background: rgba(0, 150, 255, 0.3);
    }

    .cell.selected {
      background: rgba(255, 150, 0, 0.5);
    }

    /* Tooltip */
    .cell::after {
      content: attr(data-info);
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -120%);
      background: black;
      color: white;
      padding: 4px 8px;
      font-size: 12px;
      border-radius: 5px;
      white-space: nowrap;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s;
      z-index: 10;
    }

    .cell:hover::after {
      opacity: 1;
    }
  </style>
</head>

<body>

  <!-- LEFT SIDE -->
  <div class="left">
    <div class="circle">
      <div class="grid" id="circleGrid"></div>
    </div>
  </div>

  <!-- RIGHT SIDE -->
  <div class="right">
    <h2>Square Info</h2>

    <div class="info-box">
      <img id="infoImage" src="https://via.placeholder.com/350" alt="Selected Cell Image">
      <p><strong>Row:</strong> <span id="infoRow">-</span></p>
      <p><strong>Column:</strong> <span id="infoCol">-</span></p>
      <p><strong>Cell Number:</strong> <span id="infoCell">-</span></p>
      <p><strong>Description:</strong> <span id="infoDesc">Click a square to see details.</span></p>
    </div>
  </div>

  <script>
    const circleGrid = document.getElementById("circleGrid");

    const infoRow = document.getElementById("infoRow");
    const infoCol = document.getElementById("infoCol");
    const infoCell = document.getElementById("infoCell");
    const infoDesc = document.getElementById("infoDesc");
    const infoImage = document.getElementById("infoImage");

    const rows = 11;
    const cols = 15;

    let selectedCell = null;

    // Example "database" of images/descriptions
    function getCellData(row, col, cellNumber) {
      return {
        img: `https://picsum.photos/seed/${cellNumber}/400/250`,
        desc: `This is some example information for Row ${row}, Column ${col} (Cell ${cellNumber}).`
      };
    }

    for (let r = 1; r <= rows; r++) {
      for (let c = 1; c <= cols; c++) {
        const cell = document.createElement("div");
        cell.className = "cell";

        const cellNumber = (r - 1) * cols + c;

        cell.setAttribute("data-info", `R${r}, C${c}`);

        // CLICK EVENT
        cell.addEventListener("click", () => {
          // Remove highlight from old selection
          if (selectedCell) {
            selectedCell.classList.remove("selected");
          }

          // Highlight new selection
          cell.classList.add("selected");
          selectedCell = cell;

          // Load data
          const data = getCellData(r, c, cellNumber);

          // Update right panel
          infoRow.textContent = r;
          infoCol.textContent = c;
          infoCell.textContent = cellNumber;
          infoDesc.textContent = data.desc;
          infoImage.src = data.img;
        });

        circleGrid.appendChild(cell);
      }
    }
  </script>

</body>
</html>
